<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sample Rate Benchmark — MiMo Voice Clone</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'JetBrains Mono', 'SF Mono', 'Fira Code', monospace;
    background: #000; color: #fff; padding: 40px 20px;
    max-width: 900px; margin: 0 auto;
  }
  h1 { font-size: 20px; color: #4ade80; margin-bottom: 8px; }
  .subtitle { font-size: 12px; color: #888; margin-bottom: 32px; }
  .section { margin-bottom: 32px; }
  .section h2 { font-size: 14px; color: #fff; margin-bottom: 12px; border-bottom: 1px solid #222; padding-bottom: 8px; }
  label { display: block; font-size: 11px; color: #999; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
  input[type="file"], input[type="text"], textarea {
    width: 100%; padding: 10px 12px; background: #111; border: 1px solid #222;
    border-radius: 6px; color: #fff; font-family: inherit; font-size: 13px; margin-bottom: 12px;
  }
  textarea { height: 80px; resize: vertical; }
  button {
    padding: 10px 20px; background: #4ade80; color: #000; border: none; border-radius: 6px;
    font-family: inherit; font-size: 12px; font-weight: 600; cursor: pointer; text-transform: uppercase;
    letter-spacing: 0.5px; transition: background 0.15s;
  }
  button:hover { background: #22c55e; }
  button:disabled { background: #333; color: #666; cursor: not-allowed; }
  button.secondary { background: #222; color: #fff; }
  button.secondary:hover { background: #333; }
  .file-info { font-size: 11px; color: #888; margin-bottom: 12px; }
  .results-table { width: 100%; border-collapse: collapse; margin-top: 16px; }
  .results-table th, .results-table td {
    padding: 10px 12px; text-align: left; border-bottom: 1px solid #222; font-size: 12px;
  }
  .results-table th { color: #888; font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; }
  .results-table td { color: #fff; }
  .results-table tr:hover td { background: #111; }
  .badge {
    display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 10px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.5px;
  }
  .badge-fast { background: #1b2d1b; color: #4ade80; }
  .badge-medium { background: #2d2d1b; color: #eab308; }
  .badge-slow { background: #2d1b1b; color: #ff6b6b; }
  .audio-cell { display: flex; align-items: center; gap: 8px; }
  .audio-cell audio { height: 32px; }
  .progress { margin-top: 16px; }
  .progress-bar { height: 4px; background: #222; border-radius: 2px; overflow: hidden; }
  .progress-fill { height: 100%; background: #4ade80; width: 0%; transition: width 0.3s; }
  .progress-text { font-size: 11px; color: #888; margin-top: 4px; }
  .error { color: #ff6b6b; font-size: 12px; margin-top: 8px; }
  .success { color: #4ade80; font-size: 12px; margin-top: 8px; }
  .summary { margin-top: 24px; padding: 16px; background: #111; border-radius: 8px; border: 1px solid #222; }
  .summary h3 { font-size: 13px; color: #4ade80; margin-bottom: 8px; }
  .summary p { font-size: 12px; color: #999; line-height: 1.6; }
  .hidden { display: none; }
  .flex { display: flex; gap: 8px; }
  .flex > * { flex: 1; }
</style>
</head>
<body>

<h1>Sample Rate Benchmark</h1>
<p class="subtitle">Test voice clone latency at different sample rates to find the optimal setting</p>

<div class="section">
  <h2>Setup</h2>
  <label>API Key</label>
  <input type="text" id="apiKey" placeholder="tp-xxxxxxxxxx" />
  <label>Reference Audio</label>
  <input type="file" id="audioFile" accept="audio/*" />
  <div class="file-info hidden" id="fileInfo"></div>
  <label>Text to Generate</label>
  <textarea id="textInput" placeholder="Enter text to generate...">Hello, this is a test of voice cloning at different sample rates.</textarea>
  <label>Region</label>
  <div class="flex">
    <button class="secondary region-btn" data-region="sgp" onclick="selectRegion('sgp')">Singapore (SGP)</button>
    <button class="secondary region-btn" data-region="cn" onclick="selectRegion('cn')">China (CN)</button>
    <button class="secondary region-btn" data-region="standard" onclick="selectRegion('standard')">Standard</button>
  </div>
  <div style="margin-top: 12px;">
    <button id="runBtn" onclick="runBenchmark()" disabled>Run Benchmark</button>
  </div>
</div>

<div class="section hidden" id="progressSection">
  <h2>Running Tests</h2>
  <div class="progress">
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    <div class="progress-text" id="progressText">Preparing...</div>
  </div>
</div>

<div class="section hidden" id="resultsSection">
  <h2>Results</h2>
  <table class="results-table">
    <thead>
      <tr>
        <th>Sample Rate</th>
        <th>Payload Size</th>
        <th>Latency</th>
        <th>Speed</th>
        <th>Output Audio</th>
      </tr>
    </thead>
    <tbody id="resultsBody"></tbody>
  </table>
  <div class="summary hidden" id="summary"></div>
</div>

<script>
const ENDPOINTS = {
  sgp: 'https://token-plan-sgp.xiaomimimo.com/v1/chat/completions',
  cn: 'https://token-plan-cn.xiaomimimo.com/v1/chat/completions',
  standard: 'https://api.xiaomimimo.com/v1/chat/completions',
};

const SAMPLE_RATES = [44100, 22050, 16000, 11025, 8000];

let selectedRegion = 'sgp';
let audioFile = null;
let sharedAudioCtx = null;

function getAudioCtx() {
  if (!sharedAudioCtx || sharedAudioCtx.state === 'closed') {
    sharedAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  if (sharedAudioCtx.state === 'suspended') sharedAudioCtx.resume();
  return sharedAudioCtx;
}

function selectRegion(region) {
  selectedRegion = region;
  document.querySelectorAll('.region-btn').forEach(btn => {
    btn.style.background = btn.dataset.region === region ? '#4ade80' : '#222';
    btn.style.color = btn.dataset.region === region ? '#000' : '#fff';
  });
}

document.getElementById('audioFile').addEventListener('change', (e) => {
  audioFile = e.target.files[0];
  if (audioFile) {
    const info = document.getElementById('fileInfo');
    info.textContent = `${audioFile.name} (${(audioFile.size / 1024).toFixed(1)} KB)`;
    info.classList.remove('hidden');
    checkReady();
  }
});

document.getElementById('apiKey').addEventListener('input', checkReady);

function checkReady() {
  const key = document.getElementById('apiKey').value.trim();
  document.getElementById('runBtn').disabled = !(key && audioFile);
}

async function downsampleBuffer(audioBuffer, targetSampleRate) {
  const offlineCtx = new OfflineAudioContext(
    1,
    audioBuffer.duration * targetSampleRate,
    targetSampleRate
  );
  const source = offlineCtx.createBufferSource();

  // Convert to mono if stereo
  if (audioBuffer.numberOfChannels > 1) {
    const monoCtx = new OfflineAudioContext(1, audioBuffer.length, audioBuffer.sampleRate);
    const monoSource = monoCtx.createBufferSource();
    monoSource.buffer = audioBuffer;
    monoSource.connect(monoCtx.destination);
    monoSource.start();
    const monoBuffer = await monoCtx.startRendering();
    source.buffer = monoBuffer;
  } else {
    source.buffer = audioBuffer;
  }

  source.connect(offlineCtx.destination);
  source.start();
  return await offlineCtx.startRendering();
}

function audioBufferToWav(buffer) {
  const numChannels = 1;
  const sampleRate = buffer.sampleRate;
  const length = buffer.length;
  const bytesPerSample = 2;
  const dataSize = length * numChannels * bytesPerSample;
  const arrayBuffer = new ArrayBuffer(44 + dataSize);
  const view = new DataView(arrayBuffer);

  function writeString(offset, str) {
    for (let i = 0; i < str.length; i++) view.setUint8(offset + i, str.charCodeAt(i));
  }

  writeString(0, 'RIFF');
  view.setUint32(4, 36 + dataSize, true);
  writeString(8, 'WAVE');
  writeString(12, 'fmt ');
  view.setUint32(16, 16, true);
  view.setUint16(20, 1, true);
  view.setUint16(22, numChannels, true);
  view.setUint32(24, sampleRate, true);
  view.setUint32(28, sampleRate * numChannels * bytesPerSample, true);
  view.setUint16(32, numChannels * bytesPerSample, true);
  view.setUint16(34, 16, true);
  writeString(36, 'data');
  view.setUint32(40, dataSize, true);

  const channelData = buffer.getChannelData(0);
  let offset = 44;
  for (let i = 0; i < length; i++) {
    const sample = Math.max(-1, Math.min(1, channelData[i]));
    view.setInt16(offset, sample < 0 ? sample * 0x8000 : sample * 0x7FFF, true);
    offset += 2;
  }

  return new Blob([arrayBuffer], { type: 'audio/wav' });
}

async function convertToSampleRate(file, targetSampleRate) {
  const arrayBuffer = await file.arrayBuffer();
  const audioCtx = getAudioCtx();
  const decoded = await audioCtx.decodeAudioData(arrayBuffer);
  const resampled = await downsampleBuffer(decoded, targetSampleRate);
  const wavBlob = audioBufferToWav(resampled);

  // Convert to base64 data URL
  return new Promise((resolve) => {
    const reader = new FileReader();
    reader.onload = (e) => resolve({ dataUrl: e.target.result, size: wavBlob.size });
    reader.readAsDataURL(wavBlob);
  });
}

async function callApi(apiKey, text, voiceDataUrl) {
  const body = {
    model: 'mimo-v2.5-tts-voiceclone',
    messages: [
      { role: 'user', content: 'Clone this voice' },
      { role: 'assistant', content: text },
    ],
    audio: { voice: voiceDataUrl, format: 'wav' },
  };

  const start = performance.now();
  const resp = await fetch(ENDPOINTS[selectedRegion], {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': `Bearer ${apiKey}`,
    },
    body: JSON.stringify(body),
  });
  const latency = performance.now() - start;

  if (!resp.ok) {
    const errText = await resp.text().catch(() => 'Unknown error');
    throw new Error(`API error ${resp.status}: ${errText}`);
  }

  const data = await resp.json();
  return { latency, data };
}

function formatMs(ms) {
  if (ms < 1000) return `${Math.round(ms)}ms`;
  return `${(ms / 1000).toFixed(2)}s`;
}

function formatBytes(bytes) {
  if (bytes < 1024) return `${bytes} B`;
  if (bytes < 1024 * 1024) return `${(bytes / 1024).toFixed(1)} KB`;
  return `${(bytes / (1024 * 1024)).toFixed(2)} MB`;
}

function getSpeedBadge(latency) {
  if (latency < 5000) return '<span class="badge badge-fast">Fast</span>';
  if (latency < 15000) return '<span class="badge badge-medium">Medium</span>';
  return '<span class="badge badge-slow">Slow</span>';
}

async function runBenchmark() {
  const apiKey = document.getElementById('apiKey').value.trim();
  const text = document.getElementById('textInput').value.trim();
  if (!apiKey || !audioFile || !text) return;

  const runBtn = document.getElementById('runBtn');
  runBtn.disabled = true;
  runBtn.textContent = 'Running...';

  const progressSection = document.getElementById('progressSection');
  const resultsSection = document.getElementById('resultsSection');
  const progressFill = document.getElementById('progressFill');
  const progressText = document.getElementById('progressText');
  const resultsBody = document.getElementById('resultsBody');
  const summary = document.getElementById('summary');

  progressSection.classList.remove('hidden');
  resultsSection.classList.remove('hidden');
  resultsBody.innerHTML = '';
  summary.classList.add('hidden');

  const results = [];
  const total = SAMPLE_RATES.length;

  for (let i = 0; i < total; i++) {
    const rate = SAMPLE_RATES[i];
    const progress = ((i + 1) / total) * 100;
    progressFill.style.width = `${progress}%`;
    progressText.textContent = `Testing ${rate / 1000}kHz... (${i + 1}/${total})`;

    try {
      // Convert audio to target sample rate
      const { dataUrl, size } = await convertToSampleRate(audioFile, rate);

      // Call API
      const { latency, data } = await callApi(apiKey, text, dataUrl);

      // Extract audio from response
      let audioUrl = null;
      const audioData = data?.choices?.[0]?.message?.audio?.data;
      if (audioData && typeof audioData === 'string') {
        const binary = atob(audioData);
        const bytes = new Uint8Array(binary.length);
        for (let j = 0; j < binary.length; j++) bytes[j] = binary.charCodeAt(j);
        const blob = new Blob([bytes], { type: 'audio/wav' });
        audioUrl = URL.createObjectURL(blob);
      }

      results.push({ rate, size, latency, audioUrl, error: null });
    } catch (err) {
      results.push({ rate, size: 0, latency: 0, audioUrl: null, error: err.message });
    }
  }

  // Render results
  resultsBody.innerHTML = results.map(r => `
    <tr>
      <td>${r.rate / 1000}kHz</td>
      <td>${r.error ? '—' : formatBytes(r.size)}</td>
      <td>${r.error ? '—' : formatMs(r.latency)}</td>
      <td>${r.error ? '—' : getSpeedBadge(r.latency)}</td>
      <td>${r.error
        ? `<span class="error">${r.error}</span>`
        : `<div class="audio-cell"><audio controls src="${r.audioUrl}"></audio></div>`
      }</td>
    </tr>
  `).join('');

  // Calculate summary
  const validResults = results.filter(r => !r.error);
  if (validResults.length >= 2) {
    const fastest = validResults.reduce((a, b) => a.latency < b.latency ? a : b);
    const slowest = validResults.reduce((a, b) => a.latency > b.latency ? a : b);
    const sizeReduction = ((1 - validResults[validResults.length - 1].size / validResults[0].size) * 100).toFixed(0);
    const latencyReduction = ((1 - validResults[validResults.length - 1].latency / validResults[0].latency) * 100).toFixed(0);

    summary.innerHTML = `
      <h3>Summary</h3>
      <p>
        <strong>Fastest:</strong> ${fastest.rate / 1000}kHz at ${formatMs(fastest.latency)}<br/>
        <strong>Slowest:</strong> ${slowest.rate / 1000}kHz at ${formatMs(slowest.latency)}<br/>
        <strong>Size reduction (44.1kHz → 8kHz):</strong> ${sizeReduction}%<br/>
        <strong>Latency reduction:</strong> ${latencyReduction}%<br/><br/>
        <strong>Recommendation:</strong> ${
          fastest.rate === 16000
            ? '16kHz is optimal — good balance of speed and quality.'
            : fastest.rate === 8000
            ? '8kHz is fastest, but check audio quality — may sound muffled.'
            : `${fastest.rate / 1000}kHz is fastest. Consider if the quality trade-off is acceptable.`
        }
      </p>
    `;
    summary.classList.remove('hidden');
  }

  progressText.textContent = 'Done!';
  runBtn.disabled = false;
  runBtn.textContent = 'Run Again';
}

// Initialize region selection
selectRegion('sgp');
</script>
</body>
</html>
